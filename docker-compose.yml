# AI Path - Docker Compose
# Dev 환경:  docker compose up --build
# Prod 환경: docker compose --profile prod up --build

services:
  # ── 백엔드 (공통) ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aipath-backend
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./backend:/app              # 핫리로드용 소스 마운트
      - ./public/data:/app/data:ro  # 커리큘럼 JSON 읽기 전용 마운트
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - aipath-net

  # ── 프론트엔드 Dev (핫리로드) ──────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aipath-frontend
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/app             # 핫리로드용 소스 마운트
      - /app/node_modules           # 컨테이너 내 node_modules 보존
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    restart: unless-stopped
    profiles: ["dev", ""]          # 프로필 없이 실행하면 dev 포함
    networks:
      - aipath-net

  # ── 프론트엔드 Prod (Nginx 정적 빌드) ─────────────────
  frontend-prod:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: aipath-frontend-prod
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    restart: unless-stopped
    profiles: ["prod"]
    networks:
      - aipath-net

networks:
  aipath-net:
    driver: bridge
